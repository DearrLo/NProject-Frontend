<main class="main-page">
  <aside class="sidebar">
    <div class="brand">
      <img class="logo" src="/images/logo1.png" alt="Nysa Project logo" />
      <span>Nysa Project</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active">Home</button>
      <button class="nav-item">Chats</button>
      <button class="nav-item">Characters</button>
      <button class="nav-item">Modes</button>
    </nav>

    <button class="settings-button">Parameters</button>
  </aside>

  <section class="content">
    <header class="hero">
      <p class="eyebrow">Welcome</p>
      <h1>Start a conversation now</h1>

      <p class="hero-text">
        Start a new chat with one of your characters.
      </p>
    </header>

    <section class="quick-actions">
      <article class="action-card primary">
        <h2>New chat</h2>
        <p>Start a new conversation.</p>
      </article>

      <article class="action-card">
        <h2>Create a character</h2>
        <p>Design a new personality, story and behavior.</p>
      </article>

      <article class="action-card">
        <h2>Action mode</h2>
        <p>Interact with characters through actions and narration.</p>
      </article>
    </section>

    <section class="start-chat">
      <input type="text" placeholder="Write your first message..." />
      <button type="button">Start</button>
    </section>
  </section>
</main>
